<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<meta name="theme-color" content="#020718">
	<link rel="icon" type="image/png" href="game-icon.png">
	<title>bullyslayer</title>
	<style>
		:root {
			--night: #020718;
			--panel: rgba(4, 13, 39, 0.88);
			--cyan: #26cfff;
			--blue: #2e5cff;
			--gold: #ffc247;
			--text: #f3f7ff;
		}

		html, body, #canvas {
			margin: 0;
			padding: 0;
			border: 0;
			width: 100%;
			height: 100%;
		}

		body {
			color: var(--text);
			background: var(--night);
			overflow: hidden;
			touch-action: none;
		}

		#canvas {
			display: block;
		}

		#canvas:focus {
			outline: none;
		}

		#status {
			position: fixed;
			inset: 0;
			display: grid;
			place-items: center;
			isolation: isolate;
			background: #02040a;
			visibility: visible;
			opacity: 1;
			transition: opacity 280ms ease;
		}

		#status.is-exiting {
			opacity: 0;
			pointer-events: none;
		}

		#status-splash {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			filter: brightness(0.40) saturate(1.12);
			transform: scale(1.015);
			z-index: -3;
		}

		#status-splash.show-image--false {
			display: none;
		}

		#status::before {
			content: "";
			position: absolute;
			inset: 0;
			background:
				radial-gradient(circle at 50% 44%, rgba(33, 154, 255, 0.18), transparent 34%),
				repeating-linear-gradient(0deg, rgba(76, 184, 255, 0.035) 0 1px, transparent 1px 4px),
				linear-gradient(90deg, rgba(255, 48, 92, 0.08), transparent 24% 76%, rgba(47, 93, 255, 0.10));
			z-index: -2;
			animation: scanlines 6s linear infinite;
		}

		#status::after {
			content: "";
			position: absolute;
			inset: 0;
			background: radial-gradient(ellipse at center, transparent 36%, rgba(0, 2, 12, 0.78) 100%);
			z-index: -1;
		}

		#status-card {
			width: min(620px, calc(100vw - 44px));
			box-sizing: border-box;
			padding: 34px 42px 30px;
			border: 2px solid rgba(66, 174, 255, 0.58);
			border-radius: 20px;
			background: var(--panel);
			box-shadow: 0 20px 70px rgba(0, 0, 0, 0.68), 0 0 34px rgba(35, 158, 255, 0.12);
			text-align: center;
			font-family: "Courier New", ui-monospace, monospace;
			backdrop-filter: blur(5px);
		}

		#status-kicker {
			margin: 0 0 5px;
			color: var(--cyan);
			font-size: clamp(12px, 1.5vw, 16px);
			font-weight: 900;
			letter-spacing: 0.22em;
			text-transform: uppercase;
		}

		#status-title {
			margin: 0;
			color: #ffe5a1;
			font-size: clamp(36px, 6vw, 58px);
			font-weight: 900;
			letter-spacing: 0.065em;
			line-height: 1;
			text-shadow: 0 4px 0 #07102a, 0 0 24px rgba(255, 187, 51, 0.24);
		}

		#status-subtitle {
			margin: 13px 0 26px;
			color: rgba(226, 237, 255, 0.72);
			font-size: 13px;
			font-weight: 700;
			letter-spacing: 0.14em;
		}

		#status-progress {
			position: relative;
			display: block;
			height: 25px;
			border: 2px solid rgba(255, 202, 77, 0.62);
			background: #07132e;
			overflow: hidden;
			box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.85), 0 0 16px rgba(39, 196, 255, 0.10);
		}

		#status-progress-fill {
			position: absolute;
			inset: 3px auto 3px 3px;
			width: 4%;
			background:
				repeating-linear-gradient(120deg, rgba(255, 255, 255, 0.25) 0 8px, transparent 8px 17px),
				linear-gradient(90deg, var(--blue), var(--cyan) 65%, var(--gold));
			box-shadow: 0 0 16px rgba(51, 214, 255, 0.82);
			transition: width 130ms linear;
			animation: energy-flow 780ms linear infinite;
		}

		#status-progress.indeterminate #status-progress-fill {
			width: 34%;
			animation: indeterminate 1.25s ease-in-out infinite, energy-flow 780ms linear infinite;
		}

		#status-meta {
			display: flex;
			justify-content: space-between;
			gap: 18px;
			margin-top: 10px;
			color: rgba(226, 237, 255, 0.76);
			font-size: 13px;
			font-weight: 700;
			letter-spacing: 0.07em;
		}

		#status-percent {
			color: var(--gold);
			font-weight: 900;
		}

		#status-notice {
			display: none;
			max-width: 620px;
			margin: 20px;
			padding: 18px;
			border: 2px solid #ff5a68;
			background: rgba(54, 8, 20, 0.94);
			color: #fff0f2;
			font: 700 14px/1.45 "Courier New", monospace;
			text-align: center;
		}

		@keyframes energy-flow {
			to { background-position: 32px 0, 0 0; }
		}

		@keyframes indeterminate {
			0% { left: -36%; }
			50% { left: 44%; }
			100% { left: 104%; }
		}

		@keyframes scanlines {
			to { background-position: 0 0, 0 16px, 0 0; }
		}

		@media (max-height: 520px) {
			#status-card { padding-block: 22px; }
			#status-subtitle { margin-bottom: 17px; }
		}

		@media (prefers-reduced-motion: reduce) {
			#status::before, #status-progress-fill { animation: none !important; }
		}
	</style>
	<style>html,body,#canvas{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}</style><script>document.addEventListener('DOMContentLoaded',()=>{const c=document.getElementById('canvas');if(c)c.addEventListener('pointerdown',()=>c.focus());});</script>
</head>
<body>
	<canvas id="canvas">Votre navigateur ne prend pas en charge Canvas.</canvas>
	<noscript>JavaScript est nécessaire pour lancer Bully Slayer.</noscript>

	<div id="status">
		<img id="status-splash" src="loading-background.png" alt="">
		<div id="status-card">
			<p id="status-kicker">PRÉPARATION DU COMBAT</p>
			<h1 id="status-title">BULLY SLAYER</h1>
			<p id="status-subtitle">COURAGE • MAÎTRISE • IMPACT</p>
			<div id="status-progress" class="indeterminate" role="progressbar" aria-label="Chargement" aria-valuemin="0" aria-valuemax="100">
				<div id="status-progress-fill"></div>
			</div>
			<div id="status-meta">
				<span id="status-label">CHARGEMENT DES RESSOURCES...</span>
				<span id="status-percent">--%</span>
			</div>
		</div>
		<div id="status-notice"></div>
	</div>

	<script src="index.js"></script>
	<script>
		const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":6281428,"index.wasm":12558426},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
		const GODOT_THREADS_ENABLED = false;
		const nativeFetch = window.fetch.bind(window);
		window.fetch = function (input, init) {
			const requested = typeof input === 'string' ? input : input.url;
			const url = new URL(requested, document.baseURI);
			if (!url.pathname.endsWith('.wasm')) return nativeFetch(input, init);
			if (typeof DecompressionStream === 'undefined') {
				return Promise.reject(new Error('Ce navigateur ne prend pas en charge le chargement WebAssembly gzip.'));
			}
			url.pathname += '.gzipdata';
			return nativeFetch(url, init).then((response) => {
				if (!response.ok) return response;
				const headers = new Headers(response.headers);
				headers.delete('content-encoding');
				headers.delete('content-length');
				headers.set('content-type', 'application/wasm');
				return new Response(response.body.pipeThrough(new DecompressionStream('gzip')), {
					status: response.status,
					statusText: response.statusText,
					headers,
				});
			});
		};
		const engine = new Engine(GODOT_CONFIG);

		(function () {
			const overlay = document.getElementById('status');
			const card = document.getElementById('status-card');
			const progress = document.getElementById('status-progress');
			const fill = document.getElementById('status-progress-fill');
			const percent = document.getElementById('status-percent');
			const label = document.getElementById('status-label');
			const notice = document.getElementById('status-notice');
			let initializing = true;

			function hideStatus() {
				if (!initializing) return;
				initializing = false;
				overlay.classList.add('is-exiting');
				setTimeout(() => overlay.remove(), 320);
			}

			function setProgress(current, total) {
				if (current > 0 && total > 0) {
					const ratio = Math.max(0, Math.min(1, current / total));
					progress.classList.remove('indeterminate');
					progress.setAttribute('aria-valuenow', String(Math.round(ratio * 100)));
					fill.style.width = `${Math.max(2, ratio * 100)}%`;
					percent.textContent = `${Math.round(ratio * 100)}%`;
				} else {
					progress.classList.add('indeterminate');
					progress.removeAttribute('aria-valuenow');
					percent.textContent = '--%';
				}
			}

			function displayFailureNotice(error) {
				console.error(error);
				initializing = false;
				card.style.display = 'none';
				notice.style.display = 'block';
				notice.textContent = error instanceof Error ? error.message : String(error || 'Erreur inconnue.');
			}

			const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
			if (missing.length !== 0) {
				if (GODOT_CONFIG.serviceWorker && GODOT_CONFIG.ensureCrossOriginIsolationHeaders && 'serviceWorker' in navigator) {
					Promise.race([
						navigator.serviceWorker.getRegistration().then((registration) => {
							if (registration != null) throw new Error('Service worker déjà installé.');
							return engine.installServiceWorker();
						}),
						new Promise((resolve) => setTimeout(resolve, 2000)),
					]).then(() => window.location.reload()).catch(displayFailureNotice);
				} else {
					displayFailureNotice(`Fonctions navigateur manquantes : ${missing.join(', ')}`);
				}
				return;
			}

			label.textContent = 'CHARGEMENT DES RESSOURCES...';
			engine.startGame({ onProgress: setProgress }).then(hideStatus, displayFailureNotice);
		}());
	</script>
</body>
</html>
